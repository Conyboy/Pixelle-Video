<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="512">
    <meta name="template:media-height" content="288">
    <meta name="viewport" content="width=1080, height=1920">
    <title>反焦虑竹桃视频模板 - 1080x1920</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 1080px;
            height: 1920px;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            position: relative;
            background: transparent;
            color: #241e18;
            font-family: "LXGW WenKai", "STKaiti", "KaiTi", "Kaiti SC", "Microsoft YaHei UI", serif;
        }

        .main-container {
            position: relative;
            width: 1080px;
            height: 1920px;
        }

        .background-image {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: .9;
            filter: saturate(.92) contrast(.95) sepia(.06);
        }

        .background-img[src=""] {
            display: none;
        }

        .paper-top,
        .paper-bottom {
            position: absolute;
            left: 0;
            right: 0;
            z-index: 1;
            pointer-events: none;
            background: rgba(248, 241, 230, .18);
        }

        .paper-top {
            top: 0;
            height: calc(50% - 607px / 2);
        }

        .paper-bottom {
            bottom: 0;
            height: calc(50% - 607px / 2);
        }

        .video-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1080px;
            height: 607px;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .video-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1080px;
            height: 607px;
            transform: translate(-50%, -50%);
            z-index: 3;
            border-top: 3px solid rgba(182, 64, 49, .72);
            border-bottom: 3px solid rgba(182, 64, 49, .72);
            box-shadow:
                0 -18px 38px rgba(255, 250, 241, .42),
                0 18px 38px rgba(36, 30, 24, .18);
            pointer-events: none;
        }

        .series {
            position: absolute;
            top: 112px;
            left: 92px;
            z-index: 5;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            color: #b64031;
            font-size: 52px;
            line-height: 1.05;
            letter-spacing: .18em;
            font-weight: 800;
        }

        .video-title-wrapper {
            position: absolute;
            top: calc(50% - 607px / 2 - 252px);
            left: 50%;
            width: 760px;
            transform: translateX(-50%);
            z-index: 5;
        }

        .video-title {
            width: 760px;
            max-height: 122px;
            overflow: hidden;
            text-align: center;
            color: #241e18;
            font-size: 64px;
            line-height: 1.18;
            font-weight: 500;
            letter-spacing: 0;
            text-shadow:
                0 2px 12px rgba(255, 250, 241, .92),
                0 0 2px rgba(255, 250, 241, .92);
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .content {
            position: absolute;
            bottom: calc(50% - 607px / 2 + 24px);
            left: 50%;
            width: 900px;
            transform: translateX(-50%);
            z-index: 6;
        }

        .text {
            max-height: 162px;
            overflow: hidden;
            padding: 24px 32px;
            background: rgba(36, 30, 24, .84);
            color: #fff8ed;
            text-align: center;
            font-size: 42px;
            line-height: 1.48;
            font-weight: 500;
            box-shadow: 0 18px 42px rgba(36, 30, 24, .22);
            text-shadow:
                2px 2px 4px rgba(0, 0, 0, .85),
                0 0 8px rgba(0, 0, 0, .72);
        }

        .footer {
            position: absolute;
            top: calc(50% + 607px / 2 + 62px);
            left: 50%;
            width: 900px;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 42px;
            padding-top: 44px;
            border-top: 2px solid rgba(36, 30, 24, .18);
        }

        .author-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
        }

        .author {
            color: #241e18;
            font-size: 36px;
            line-height: 1.2;
            font-weight: 700;
        }

        .author-desc {
            color: #6c5f50;
            font: 28px/1.62 "Microsoft YaHei UI", sans-serif;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            min-width: 180px;
        }

        .logo {
            color: #b64031;
            font-size: 32px;
            line-height: 1.2;
            font-weight: 800;
            letter-spacing: 0;
            text-align: right;
        }

        .small-seal {
            position: absolute;
            right: 82px;
            bottom: 92px;
            width: 96px;
            height: 96px;
            z-index: 6;
            display: grid;
            place-items: center;
            border: 4px solid #b64031;
            background: rgba(255, 255, 255, .22);
            color: #b64031;
            font-size: 24px;
            font-weight: 800;
            line-height: 1.05;
            transform: rotate(4deg);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="background-image">
            <img class="background-img" src="{{background=resources/bg.png}}" alt="">
        </div>
        <div class="paper-top"></div>
        <div class="paper-bottom"></div>

        <div class="series">{{series_name=反焦虑}}</div>

        <div class="video-title-wrapper">
            <div class="video-title">{{title}}</div>
        </div>

        <div class="video-overlay"></div>
        <div class="video-frame"></div>

        <div class="content">
            <div class="text">{{text}}</div>
        </div>

        <div class="footer">
            <div class="author-section">
                <div class="author">{{author=@keep alive}}</div>
                <div class="author-desc">{{describe=一个懂代码的焦虑康复者，用理科思维拆解情绪问题。}}</div>
            </div>
            <div class="logo-section">
                <div class="logo">{{brand=反焦虑}}</div>
            </div>
        </div>

        <div class="small-seal">慢<br>慢<br>来</div>
    </div>

    <script>
        function autoFitFontSize(element, maxWidth, minFontSize, maxFontSize) {
            try {
                if (!element || !element.textContent || !element.textContent.trim()) {
                    return;
                }

                const measure = document.createElement('span');
                measure.style.visibility = 'hidden';
                measure.style.position = 'absolute';
                measure.style.top = '-9999px';
                measure.style.left = '-9999px';
                measure.style.whiteSpace = 'nowrap';

                const computedStyle = window.getComputedStyle(element);
                measure.style.fontFamily = computedStyle.fontFamily;
                measure.style.fontSize = computedStyle.fontSize;
                measure.style.fontWeight = computedStyle.fontWeight;
                measure.style.letterSpacing = computedStyle.letterSpacing;
                measure.textContent = element.textContent;

                document.body.appendChild(measure);

                let low = minFontSize;
                let high = maxFontSize;
                let bestSize = maxFontSize;

                measure.style.fontSize = maxFontSize + 'px';
                if (measure.offsetWidth > maxWidth) {
                    while (high - low > 0.5) {
                        const mid = (low + high) / 2;
                        measure.style.fontSize = mid + 'px';
                        if (measure.offsetWidth <= maxWidth) {
                            bestSize = mid;
                            low = mid;
                        } else {
                            high = mid;
                        }
                    }
                }

                element.style.fontSize = bestSize + 'px';
                document.body.removeChild(measure);
            } catch (error) {
                console.error('自动调整字体大小出错:', error);
            }
        }

        function initAutoFit() {
            const titleElement = document.querySelector('.video-title');
            if (titleElement) {
                autoFitFontSize(titleElement, 760, 34, 64);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAutoFit);
        } else {
            initAutoFit();
        }

        if (typeof MutationObserver !== 'undefined') {
            const observer = new MutationObserver(function() {
                setTimeout(initAutoFit, 100);
            });

            if (document.body) {
                observer.observe(document.body, {
                    childList: true,
                    subtree: true,
                    characterData: true
                });
            }
        }
    </script>
</body>
</html>
