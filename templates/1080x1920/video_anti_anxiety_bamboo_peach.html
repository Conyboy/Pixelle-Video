<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="576">
    <meta name="viewport" content="width=1080, height=1920">
    <title>反焦虑书香视频模板 - 1080x1920</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 1080px;
            height: 1920px;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            position: relative;
            background: transparent;
            color: #241e18;
            font-family: "Noto Serif CJK SC", "Noto Serif CJK", "Source Han Serif SC", "Songti SC", "SimSun", serif;
        }

        .main-container {
            position: relative;
            width: 1080px;
            height: 1920px;
        }

        .background-image {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .background-top,
        .background-bottom {
            position: absolute;
            left: 0;
            width: 1080px;
            overflow: hidden;
        }

        .background-top {
            top: 0;
            height: calc(50% - 607px / 2);
        }

        .background-bottom {
            bottom: 0;
            height: calc(50% - 607px / 2);
        }

        .background-img {
            position: absolute;
            left: 0;
            width: 1080px;
            height: 1920px;
            object-fit: cover;
            opacity: .82;
            filter: saturate(.92) contrast(.96) sepia(.08);
        }

        .background-top .background-img {
            top: 0;
        }

        .background-bottom .background-img {
            bottom: 0;
        }

        .background-img[src=""] {
            display: none;
        }

        .paper-top,
        .paper-bottom {
            position: absolute;
            left: 0;
            right: 0;
            z-index: 1;
            pointer-events: none;
            background: rgba(255, 250, 241, .2);
        }

        .paper-top {
            top: 0;
            height: calc(50% - 607px / 2);
        }

        .paper-bottom {
            bottom: 0;
            height: calc(50% - 607px / 2);
        }

        .series {
            position: absolute;
            top: 86px;
            left: 90px;
            right: 90px;
            z-index: 5;
            color: #a83d31;
            font-size: 38px;
            line-height: 1.2;
            letter-spacing: .12em;
            font-weight: 700;
            text-align: center;
            text-shadow:
                0 2px 10px rgba(255, 250, 241, .9),
                0 0 2px rgba(255, 250, 241, .92);
        }

        .video-title-wrapper {
            position: absolute;
            top: calc(50% - 607px / 2 - 430px);
            left: 50%;
            width: 900px;
            transform: translateX(-50%);
            z-index: 5;
        }

        .video-title {
            width: 900px;
            max-height: 258px;
            overflow: hidden;
            text-align: center;
            color: #241e18;
            font-family: "Noto Serif CJK SC", "Noto Serif CJK", "Source Han Serif SC", "Songti SC", "SimSun", serif;
            font-size: 76px;
            line-height: 1.16;
            font-weight: 700;
            letter-spacing: 0;
            text-wrap: balance;
            text-shadow:
                0 2px 8px rgba(255, 250, 241, .92),
                0 0 1px rgba(255, 250, 241, .96);
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .video-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1080px;
            height: 607px;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .content {
            position: absolute;
            top: calc(50% + 607px / 2 + 34px);
            left: 50%;
            width: 900px;
            transform: translateX(-50%);
            z-index: 6;
        }

        .text {
            max-height: 168px;
            overflow: hidden;
            padding: 22px 34px;
            background: rgba(36, 30, 24, .84);
            color: #fff8ed;
            text-align: center;
            font-family: "Noto Serif CJK SC", "Noto Serif CJK", "Source Han Serif SC", "Songti SC", "SimSun", serif;
            font-size: 36px;
            line-height: 1.55;
            font-weight: 500;
            box-shadow: 0 18px 42px rgba(36, 30, 24, .2);
            text-shadow:
                2px 2px 4px rgba(0, 0, 0, .82),
                0 0 8px rgba(0, 0, 0, .68);
        }

        .footer {
            position: absolute;
            top: calc(50% + 607px / 2 + 244px);
            left: 50%;
            width: 900px;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 42px;
            padding-top: 42px;
            border-top: 2px solid rgba(36, 30, 24, .18);
        }

        .author-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 610px;
        }

        .author {
            color: #241e18;
            font-size: 38px;
            line-height: 1.2;
            font-weight: 800;
        }

        .author-desc {
            color: #6c5f50;
            font: 28px/1.58 "Noto Serif CJK SC", "Noto Serif CJK", "Source Han Serif SC", "Songti SC", "SimSun", serif;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            min-width: 210px;
        }

        .logo {
            color: #b64031;
            font-size: 36px;
            line-height: 1.2;
            font-weight: 800;
            letter-spacing: 0;
            text-align: right;
        }

        .small-seal {
            position: absolute;
            right: 82px;
            bottom: 74px;
            width: 96px;
            height: 96px;
            z-index: 6;
            display: grid;
            place-items: center;
            border: 4px solid #b64031;
            background: rgba(255, 255, 255, .18);
            color: #b64031;
            font-size: 24px;
            font-weight: 800;
            line-height: 1.05;
            text-align: center;
            transform: rotate(4deg);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="background-image">
            <div class="background-top">
                <img class="background-img" src="{{background=resources/bg.png}}" alt="">
            </div>
            <div class="background-bottom">
                <img class="background-img" src="{{background=resources/bg.png}}" alt="">
            </div>
        </div>
        <div class="paper-top"></div>
        <div class="paper-bottom"></div>

        <div class="series">{{series_name=通过书本来缓解你的焦虑}}</div>

        <div class="video-title-wrapper">
            <div class="video-title">{{title}}</div>
        </div>

        <div class="video-overlay"></div>

        <div class="content">
            <div class="text">{{text}}</div>
        </div>

        <div class="footer">
            <div class="author-section">
                <div class="author">{{author=@keep alive}}</div>
                <div class="author-desc">{{describe=通过书本来缓解你的焦虑}}</div>
            </div>
            <div class="logo-section">
                <div class="logo">{{brand=书里的另一个我}}</div>
            </div>
        </div>

        <div class="small-seal">慢<br>慢<br>来</div>
    </div>

    <script>
        function autoFitMultilineFontSize(element, maxWidth, maxHeight, minFontSize, maxFontSize) {
            try {
                if (!element || !element.textContent || !element.textContent.trim()) {
                    return;
                }

                const measure = document.createElement('div');
                measure.style.visibility = 'hidden';
                measure.style.position = 'absolute';
                measure.style.top = '-9999px';
                measure.style.left = '-9999px';
                measure.style.width = maxWidth + 'px';
                measure.style.whiteSpace = 'normal';
                measure.style.wordBreak = 'break-word';
                measure.style.overflowWrap = 'anywhere';

                const computedStyle = window.getComputedStyle(element);
                measure.style.fontFamily = computedStyle.fontFamily;
                measure.style.fontSize = computedStyle.fontSize;
                measure.style.fontWeight = computedStyle.fontWeight;
                measure.style.letterSpacing = computedStyle.letterSpacing;
                measure.style.lineHeight = computedStyle.lineHeight;
                measure.style.textAlign = computedStyle.textAlign;
                measure.textContent = element.textContent;

                document.body.appendChild(measure);

                let low = minFontSize;
                let high = maxFontSize;
                let bestSize = maxFontSize;

                while (high - low > 0.5) {
                    const mid = (low + high) / 2;
                    measure.style.fontSize = mid + 'px';
                    if (measure.scrollWidth <= maxWidth && measure.scrollHeight <= maxHeight) {
                        bestSize = mid;
                        low = mid;
                    } else {
                        high = mid;
                    }
                }

                element.style.fontSize = bestSize + 'px';
                document.body.removeChild(measure);
            } catch (error) {
                console.error('自动调整字体大小出错:', error);
            }
        }

        function initAutoFit() {
            const titleElement = document.querySelector('.video-title');
            if (titleElement) {
                autoFitMultilineFontSize(titleElement, 900, 258, 52, 76);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAutoFit);
        } else {
            initAutoFit();
        }

        if (typeof MutationObserver !== 'undefined') {
            const observer = new MutationObserver(function() {
                setTimeout(initAutoFit, 100);
            });

            if (document.body) {
                observer.observe(document.body, {
                    childList: true,
                    subtree: true,
                    characterData: true
                });
            }
        }
    </script>
</body>
</html>
